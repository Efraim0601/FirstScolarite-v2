# OpenTelemetry Collector : recoit les traces OTLP des services (Micrometer Tracing)
# et les exporte vers Jaeger. Expose aussi les metriques du collector pour Prometheus.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 2s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  # Jaeger accepte nativement OTLP depuis la v1.35+
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger]
  telemetry:
    metrics:
      address: 0.0.0.0:8889
