name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · Maven (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firstpay-studio
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test all modules
        run: mvn -B -ntp verify

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: 'firstpay-studio/**/target/surefire-reports/*.xml'
          if-no-files-found: ignore

  frontend:
    name: Frontend · Angular (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firstpay-studio/apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: firstpay-studio/apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - apps/api-gateway
          - services/transaction-service
          - services/partner-service
          - services/payment-service
          - services/reporting-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: firstpay-studio
          file: firstpay-studio/${{ matrix.service }}/Dockerfile
          push: false
          tags: firstpay/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
