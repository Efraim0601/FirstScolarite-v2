name: Load test

on:
  workflow_dispatch:
    inputs:
      targetTps:
        description: Target TPS per injector
        required: false
        default: '200'
      baseUrl:
        description: API Gateway URL
        required: false
        default: 'http://localhost:8080'

jobs:
  gatling:
    name: Gatling load simulation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firstpay-studio/tests/load-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run TransactionLoadSimulation
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew gatlingRun-com.firstpay.load.TransactionLoadSimulation \
            -DbaseUrl=${{ github.event.inputs.baseUrl }} \
            -DtargetTps=${{ github.event.inputs.targetTps }} \
            -DrampSeconds=30 -DholdSeconds=60 || true

      - name: Validate SLO
        run: |
          chmod +x ../slo-recette/validate-slo.sh
          ../slo-recette/validate-slo.sh || true

      - name: Upload Gatling report
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: firstpay-studio/tests/load-tests/build/reports/gatling/
          if-no-files-found: ignore
