server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA : toutes les routes retombent sur index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API vers la gateway (conserve le préfixe /api)
  location /api/ {
    proxy_pass http://api-gateway:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_buffering off;          # nécessaire pour SSE
  }

  # Webhooks TrustPayWay (si le nginx hôte envoie tout le trafic vers ce conteneur)
  location /webhooks/ {
    proxy_pass http://api-gateway:8080/webhooks/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
