server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Assets statiques de l'app payeur (app.js, index.html)
  location = /app.js   { try_files /app.js =404; }

  # API publique → gateway (route /public/** vers partner-service, sans auth).
  # Résolution paresseuse via le DNS Docker (variable) : nginx ne plante pas au démarrage
  # si la gateway n'est pas encore résolvable, et reflète les redéploiements.
  location /public/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gw api-gateway;
    proxy_pass http://$gw:8080$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection '';
  }

  # SPA : /{shortCode}/{slug} (et tout le reste) retombe sur index.html
  location / {
    try_files $uri /index.html;
  }
}
