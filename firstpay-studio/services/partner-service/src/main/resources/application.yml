spring:
  application:
    name: partner-service
  r2dbc:
    url: ${DB_URL:r2dbc:pool:postgresql://localhost:6432/firstpay}
    username: ${DB_USER:firstpay}
    password: ${DB_PASS:dev_password}
  flyway:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/firstpay}
    user: ${DB_USER:firstpay}
    password: ${DB_PASS:dev_password}
    locations: classpath:db/migration
    table: partner_flyway_schema_history
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  threads:
    virtual:
      enabled: true
server:
  port: 8080
  shutdown: graceful

# Auth portail : MÊME secret que l'API Gateway (qui vérifie les tokens émis ici).
firstpay:
  jwt:
    secret: ${JWT_SECRET:firstpay-dev-secret-change-me-please-32b}
    ttl-seconds: ${JWT_TTL_SECONDS:28800}
  internal-token: ${INTERNAL_TOKEN:}
  # Appel server-to-server pour l'initiation de paiement depuis la page payeur publique.
  transaction-service-uri: ${TRANSACTION_SVC_URI:http://localhost:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 20ms,100ms,500ms
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
