spring:
  application:
    name: reporting-service

  # Lectures via read replica (même URL en local ; READ_DB_URL en prod)
  r2dbc:
    url: ${READ_DB_URL:${DB_URL:r2dbc:pool:postgresql://localhost:6432/firstpay}}
    username: ${DB_USER:firstpay}
    password: ${DB_PASS:dev_password}
    pool:
      initial-size: 5
      max-size: 30

  # Flyway sur JDBC primaire ; table dédiée (schéma reporting isolé du transaction-service)
  flyway:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/firstpay}
    user: ${DB_USER:firstpay}
    password: ${DB_PASS:dev_password}
    locations: classpath:db/migration
    table: reporting_flyway_schema_history

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

  threads:
    virtual:
      enabled: true

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 20ms,100ms,500ms
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
